<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Auto Refresh & Save</title>
  <link href="css/style.css" rel="stylesheet">
  <script src="scripts/popup.js" defer></script>
</head>
<body>
<div id="wrapper">

  <!-- Status Banner -->
  <div id="status-banner" class="banner-stopped">
    <div id="status-dot"></div>
    <span id="status-text">STOPPED</span>
  </div>

  <!-- URL -->
  <div class="section">
    <div class="section-label">URL for this tab</div>
    <input id="urlInput" type="text" class="full-input" placeholder="https://example.com">
  </div>

  <!-- Interval -->
  <div class="section">
    <div class="section-label">Refresh interval (seconds)</div>
    <div class="row">
      <span class="lbl">Min</span>
      <input id="minInterval" type="number" min="1" value="30" class="small-input">
      <span class="lbl">Max</span>
      <input id="maxInterval" type="number" min="1" value="90" class="small-input">
    </div>
  </div>

  <!-- Folder -->
  <div class="section">
    <div class="section-label">Download folder <span class="hint">(inside Downloads/)</span></div>
    <input id="folderName" type="text" class="full-input" placeholder="upwork">
  </div>

  <!-- Next refresh countdown -->
  <div id="next-bar">Next refresh in: <span id="lblNextIn">—</span></div>

  <!-- Action button -->
  <button id="btnAction" class="btn-start">▶ Start</button>

</div>
</body>
</html>
